name: solar_calculator
description: "A professional solar panel output, savings, and payback calculator for Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local persistence
  shared_preferences: ^2.3.2

  # Typography
  google_fonts: ^6.2.1

  # Date formatting (for history screen)
  intl: ^0.19.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
